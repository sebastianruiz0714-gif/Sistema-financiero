<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Pro Local</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="container">
    <header>
        <h1>💰 Créditos JSC</h1>
    </header>

    <section class="grid grid-2">
        <div class="card card-border-blue">
            <small>💰 Capital Disponible</small>
            <div id="caja-capital" class="caja-monto">$ 0</div>
            <button onclick="setCapital()" class="btn-sm">Configurar Fondo</button>
        </div>
        <div class="card card-border-green">
            <small>📈 Ganancias Generadas</small>
            <div id="caja-ganancias" class="caja-monto text-green">$ 0</div>
        </div>
    </section>

    <section class="card">
        <h3>Nuevo crédito</h3>
        <div class="grid grid-3">
            <input id="nombre" name="nombre" placeholder="Nombre completo" type="text">
            <input id="identidad" name="identidad" placeholder="Número identidad" type="text">
            <input id="telefono" name="telefono" placeholder="Contacto (WhatsApp)" type="text">
            <input id="monto" name="monto" placeholder="Monto a prestar" type="number">
            <input id="interes" name="interes" placeholder="% interés" type="number">
            <input id="cuotas" name="cuotas" placeholder="Cuotas (ej: 6)" type="number">
        </div>

        <div class="radio-group">
            <label><input type="radio" name="frecuencia" value="quincenal" checked> Quincenal</label>
            <label><input type="radio" name="frecuencia" value="mensual"> Mensual</label>
        </div>

        <div class="total-display">Total a cobrar: <span id="total-preview">$ 0</span></div>
        
        <div class="date-group">
            <label for="fecha-primer-pago">Fecha del primer pago:</label>
            <input type="date" id="fecha-primer-pago" name="fecha-primer-pago">
        </div>

        <button id="btn-crear" class="btn btn-primary">Crear crédito</button>
    </section>

    <section class="card flex-row">
        <input type="text" id="buscador" name="buscador" placeholder="🔍 Buscar por nombre o identidad..." class="flex-grow">
        <select id="filtro-estado" name="filtro-estado" onchange="renderizar()">
            <option value="todos">Todos los créditos</option>
            <option value="pendientes">Solo Pendientes</option>
            <option value="pagados">Solo Pagados</option>
        </select>
    </section>

    <section class="card flex-row">
        <button onclick="exportarDatos()" class="btn btn-dark flex-grow">📥 Descargar Respaldo</button>
        <label for="importar" class="btn btn-purple flex-grow text-center">
            📤 Cargar Respaldo
            <input type="file" id="importar" name="importar" class="hidden" onchange="importarDatos(event)">
        </label>
    </section>

    <section>
        <h3>Lista de Créditos</h3>
        <div id="lista-creditos"></div>
    </section>
</div>

<script src="app.js"></script>
</body>
</html>

<script src="app.js"></script>
</body>
</html>
